name: Build Docs Bundle

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pages: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Javadoc
        run: mvn -B javadoc:javadoc

      - name: Assemble doc bundle
        run: |
          mkdir -p bundle
          cp -r docs/* bundle/ || true
          cp -r target/site/apidocs bundle/apidocs || true
          cp -r .git bundle/.git

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-bundle
          path: bundle/
          retention-days: 30
